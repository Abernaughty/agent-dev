name: Claude Issue Fix

on:
  issues:
    types: [labeled]

jobs:
  fix:
    name: Claude Fix
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Read issue #${{ github.event.issue.number }} and implement a fix.
            Follow the project conventions in CLAUDE.md.
            Create a PR with the changes referencing the issue.
