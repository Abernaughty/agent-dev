name: CI

on:
  push:
    branches: [main]
    paths:
      - 'dev-suite/**'
      - 'dashboard/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dev-suite/**'
      - 'dashboard/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dev-suite

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            dev-suite/.venv
          key: uv-${{ runner.os }}-py3.13-${{ hashFiles('dev-suite/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: uv sync --group dev --group api

      - name: Auto-fix lint issues
        run: uv run ruff check src/ tests/ --fix || true

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short -x
        env:
          ANTHROPIC_API_KEY: test-key-not-real
          GOOGLE_API_KEY: test-key-not-real
          E2B_API_KEY: test-key-not-real

  dashboard:
    name: Dashboard checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check
        continue-on-error: true
